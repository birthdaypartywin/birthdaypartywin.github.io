<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Party Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body {
    margin:0;
    font-family:'Poppins', sans-serif;
    background: linear-gradient(-45deg,#ff00cc,#ff8c00,#00f5ff,#ff0000);
    background-size:400% 400%;
    animation:bgMove 6s ease infinite;
    overflow-x:hidden;
    color:white;
}
@keyframes bgMove {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.launch-banner {
    text-align:center;
    padding:12px;
    font-weight:800;
    background:rgba(0,0,0,0.4);
    letter-spacing:1px;
}

.wrapper {
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 50px);
    padding:20px;
}

.card {
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(25px);
    border:2px solid rgba(255,255,255,0.3);
    padding:50px 40px;
    border-radius:30px;
    max-width:550px;
    width:100%;
    text-align:center;
    box-shadow:0 0 60px rgba(255,0,128,0.6);
    animation:popIn 0.6s ease;
}
@keyframes popIn {
    0%{transform:scale(0.7);opacity:0}
    100%{transform:scale(1);opacity:1}
}

h1 {
    font-size:38px;
    margin-bottom:10px;
    text-shadow:0 0 20px #fff;
}

.sub {
    margin-bottom:25px;
    font-size:16px;
}

input, select {
    width:100%;
    padding:16px;
    margin:12px 0;
    border-radius:14px;
    border:none;
    font-size:15px;
    font-weight:600;
}

.row {
    display:flex;
    gap:10px;
}

.phone-group {
    display:flex;
    gap:8px;
}

.phone-group select {
    width:100px;
}

button {
    width:100%;
    padding:20px;
    margin-top:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#ff00cc,#ff8c00);
    color:white;
    font-size:22px;
    font-weight:800;
    cursor:pointer;
    transition:0.3s;
}
button:hover {
    transform:scale(1.1);
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.info-box {
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="launch-banner">
🚀 Launching 1st June 2026 🚀
</div>

<div class="wrapper">
<div class="card">

<h1>HURRY REGISTER NOW!!<br>UP TO $500 IN PRIZES!!</h1>
<div class="sub">Enter once. Win every year.</div>

<form id="entryForm">

<div class="row">
<input type="text" name="first_name" placeholder="First Name" required>
<input type="text" name="surname" placeholder="Surname" required>
</div>

<select name="sex" required>
<option value="" disabled selected>Select Sex</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
<option>Prefer not to say</option>
</select>

<input type="email" name="email" placeholder="Email Address" required>

<div class="phone-group">
<select name="country_code" required>
<option value="+61">+61</option>
<option value="+1">+1</option>
<option value="+44">+44</option>
<option value="+64">+64</option>
</select>
<input type="tel" name="phone" placeholder="Phone Number" required>
</div>

<input type="text" id="dob" name="date_of_birth" placeholder="Select Your Birthday" required>

<div class="info-box" id="birthdayInfo"></div>

<button type="submit">ENTER NOW 🚀</button>

</form>

</div>
</div>

<script>
// FLATPICKR CALENDAR
flatpickr("#dob", {
    dateFormat: "Y-m-d",
    maxDate: "today",
    onChange: function(selectedDates) {
        if (!selectedDates.length) return;

        const birthDate = selectedDates[0];
        const today = new Date();

        const age = today.getFullYear() - birthDate.getFullYear();
        if (age < 18) {
            alert("You must be 18+ to enter.");
            document.getElementById("dob").value = "";
            return;
        }

        const nextBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
        if (nextBirthday < today) {
            nextBirthday.setFullYear(today.getFullYear() + 1);
        }

        const diffTime = nextBirthday - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        const zodiac = getZodiac(birthDate.getMonth()+1, birthDate.getDate());

        document.getElementById("birthdayInfo").innerHTML =
            "🎉 " + diffDays + " days until your birthday!<br>♈ Zodiac: " + zodiac;
    }
});

// ZODIAC FUNCTION
function getZodiac(month, day) {
    const signs = [
        ["Capricorn",1,19],["Aquarius",2,18],["Pisces",3,20],
        ["Aries",4,19],["Taurus",5,20],["Gemini",6,20],
        ["Cancer",7,22],["Leo",8,22],["Virgo",9,22],
        ["Libra",10,22],["Scorpio",11,21],["Sagittarius",12,21],
        ["Capricorn",12,31]
    ];
    for (let i=0;i<signs.length;i++){
        if (month===signs[i][1] && day<=signs[i][2]) return signs[i][0];
    }
    return "Unknown";
}

// FORM SUBMIT
document.getElementById("entryForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const formData = new FormData(this);

    await fetch("https://formspree.io/f/xpqjgdww", {
        method:"POST",
        body:formData,
        headers:{ 'Accept':'application/json' }
    });

    window.location.href="thankyou.html";
});
</script>

</body>
</html>
