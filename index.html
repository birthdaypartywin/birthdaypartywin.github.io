<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Party Giveaway</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<style>

*{

box-sizing:border-box;

}

body{

margin:0;

font-family:'Poppins',sans-serif;

background:

radial-gradient(circle at 20% 30%,#ff00cc,transparent 40%),

radial-gradient(circle at 80% 70%,#00f5ff,transparent 40%),

linear-gradient(-45deg,#ff0080,#ff8c00,#00f5ff,#ff0000);

background-size:400% 400%;

animation:bgMove 8s ease infinite;

color:white;

}

@keyframes bgMove{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

.container{

max-width:420px;

margin:auto;

padding:40px 20px;

}

h1{

text-align:center;

font-size:34px;

font-weight:800;

margin-bottom:5px;

}

.sub{

text-align:center;

font-size:22px;

color:#ffe600;

margin-bottom:30px;

}

input,select{

width:100%;

padding:16px;

border-radius:30px;

border:none;

margin-bottom:14px;

font-size:16px;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:40px;

font-size:20px;

font-weight:800;

color:white;

cursor:pointer;

}

.enter{

background:linear-gradient(90deg,#ff00cc,#ff7a00);

}

.success{

display:none;

text-align:center;

font-size:24px;

margin-top:30px;

}

.error{

color:#ffdfdf;

text-align:center;

margin-bottom:10px;

}
</style>
</head>
<body>
<div class="container">
<h1>HURRY REGISTER NOW</h1>
<div class="sub">UP TO $500 IN PRIZES</div>
<div class="error" id="error"></div>
<form id="signupForm">
<input id="firstname" placeholder="First Name">
<input id="lastname" placeholder="Last Name">
<select id="sex">
<option value="">Select Sex</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
<input id="email" type="email" placeholder="Email">
<input id="phone" placeholder="Phone Number">
<input id="birthday" placeholder="Select Your Birthday">
<button type="submit" class="enter">ENTER NOW 🚀</button>
</form>
<div class="success" id="success">

Entry submitted successfully 🎉
</div>
</div>
<script>

flatpickr("#birthday",{

dateFormat:"d M Y",

maxDate:"today"

});

document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault();

const errorBox = document.getElementById("error");

errorBox.innerHTML = "";

const firstname = document.getElementById("firstname").value.trim();

const lastname = document.getElementById("lastname").value.trim();

const sex = document.getElementById("sex").value;

const email = document.getElementById("email").value.trim();

const phone = document.getElementById("phone").value.trim();

const birthdayValue = document.getElementById("birthday").value;

if(!firstname || !lastname || !sex || !email || !phone || !birthdayValue){

errorBox.innerHTML="Please complete all fields";

return;

}

const birth = new Date(birthdayValue);

const today = new Date();

let age = today.getFullYear() - birth.getFullYear();

let m = today.getMonth() - birth.getMonth();

if(m < 0 || (m === 0 && today.getDate() < birth.getDate())){

age--;

}

if(age < 18){

errorBox.innerHTML="You must be over 18 to enter";

return;

}

document.getElementById("signupForm").style.display="none";

document.getElementById("success").style.display="block";

});
</script>
</body>
</html>
