<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Giveaway</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Birthday Giveaway</h1>
    <p>Enter your details for a chance to win!</p>
    <form id="giveaway-form" action="https://formspree.io/f/xpqjgdvw" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="dob">Date of Birth</label>
      <div class="dob-group">
        <input type="text" id="dob_d1" maxlength="1" required>
        <input type="text" id="dob_d2" maxlength="1" required>
        <span>/</span>
        <input type="text" id="dob_m1" maxlength="1" required>
        <input type="text" id="dob_m2" maxlength="1" required>
        <span>/</span>
        <input type="text" id="dob_y1" maxlength="1" required>
        <input type="text" id="dob_y2" maxlength="1" required>
      </div>
      <input type="hidden" id="dob" name="dob">

      <button type="submit">Enter Giveaway</button>
    </form>
  </div>
<script src="script.js"></script>
</body>
</html>
