<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Party Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:
radial-gradient(circle at 20% 30%,#ff00cc,transparent 40%),
radial-gradient(circle at 80% 70%,#00f5ff,transparent 40%),
linear-gradient(-45deg,#ff0080,#ff8c00,#00f5ff,#ff0000);
background-size:400% 400%;
animation:bgMove 8s ease infinite;
overflow-x:hidden;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.launch-banner{
text-align:center;
padding:14px;
font-weight:800;
background:rgba(0,0,0,0.6);
letter-spacing:2px;
}

.wrapper{
display:flex;
justify-content:center;
align-items:center;
min-height:calc(100vh - 60px);
padding:30px 20px;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(25px);
border-radius:30px;
padding:60px 50px;
max-width:600px;
width:100%;
text-align:center;
box-shadow:0 0 80px rgba(255,0,128,0.6),
0 0 150px rgba(0,255,255,0.5);
}

.nuclear-headline{
font-size:34px;
font-weight:800;
text-transform:uppercase;
margin-bottom:10px;
}

.prize-line{
font-size:22px;
font-weight:800;
color:#ffff00;
margin-bottom:25px;
}

form{
display:flex;
flex-direction:column;
gap:18px;
}

.row,.phone-group{
display:flex;
gap:18px;
}

input,select{
flex:1;
padding:18px;
border-radius:14px;
border:none;
font-size:15px;
font-weight:600;
background:white;
width:100%;
}

button{
padding:22px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#ff00cc,#ff8c00);
color:white;
font-size:22px;
font-weight:800;
cursor:pointer;
}

</style>
</head>

<body>

<div class="launch-banner">
🚀 Launching 1st June 2026 🚀
</div>

<div class="wrapper">
<div class="card">

<div class="nuclear-headline">HURRY REGISTER NOW</div>
<div class="prize-line">UP TO $500 IN PRIZES</div>

<form id="entryForm">

<div class="row">
<input type="text" name="first_name" placeholder="First Name" required>
<input type="text" name="surname" placeholder="Surname" required>
</div>

<select name="sex" required>
<option value="" disabled selected>Select Sex</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
<option>Prefer not to say</option>
</select>

<input type="email" name="email" placeholder="Email Address" required>

<div class="phone-group">
<select name="country_code">
<option value="+61">+61</option>
<option value="+1">+1</option>
<option value="+44">+44</option>
<option value="+64">+64</option>
</select>

<input type="tel" name="phone" placeholder="Phone Number" required>
</div>

<input type="text" id="dob" name="date_of_birth" placeholder="Select Your Birthday" required>

<button type="submit">ENTER NOW 🚀</button>

</form>

</div>
</div>

<script>

flatpickr("#dob",{
dateFormat:"Y-m-d",
maxDate:"today"
});

document.getElementById("entryForm").addEventListener("submit",function(e){

e.preventDefault();

const dob=document.getElementById("dob").value;

if(!dob){
alert("Please select your birthday");
return;
}

const today=new Date();
const birthDate=new Date(dob);

let age=today.getFullYear()-birthDate.getFullYear();
let m=today.getMonth()-birthDate.getMonth();

if(m<0||(m===0&&today.getDate()<birthDate.getDate())){
age--;
}

if(age<18){
alert("You must be over 18 to enter.");
document.getElementById("dob").value="";
return;
}

window.location.href="thank-you.html";

});

</script>

</body>
</html>
