<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Party Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:
radial-gradient(circle at 20% 30%,#ff00cc,transparent 40%),
radial-gradient(circle at 80% 70%,#00f5ff,transparent 40%),
linear-gradient(-45deg,#ff0080,#ff8c00,#00f5ff,#ff0000);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
overflow-x:hidden;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Light sweep beams */
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,0.15),transparent 60%);
animation:beam 8s linear infinite;
pointer-events:none;
}
@keyframes beam{
0%{transform:translateX(-100%)}
100%{transform:translateX(100%)}
}

/* Floating particle dots */
.particle{
position:fixed;
bottom:-20px;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.4;
animation:rise linear infinite;
}
@keyframes rise{
100%{transform:translateY(-110vh);opacity:0;}
}

/* Confetti drift */
.confetti{
position:fixed;
top:-20px;
border-radius:3px;
animation:fall linear infinite;
z-index:1;
}
@keyframes fall{
100%{transform:translateY(110vh) translateX(60px) rotate(720deg);}
}

.launch-banner{
text-align:center;
padding:14px;
font-weight:800;
background:rgba(0,0,0,0.6);
letter-spacing:2px;
}

.wrapper{
display:flex;
justify-content:center;
align-items:center;
min-height:calc(100vh - 60px);
padding:30px 20px;
position:relative;
z-index:5;
}

/* Floating card */
.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(25px);
border-radius:30px;
padding:60px 50px;
max-width:600px;
width:100%;
text-align:center;
box-shadow:0 0 80px rgba(255,0,128,0.6),
0 0 150px rgba(0,255,255,0.5);
animation:float 6s ease-in-out infinite;
}
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

/* Headline */
.nuclear-headline{
font-size:34px;
font-weight:800;
text-transform:uppercase;
background:linear-gradient(90deg,#ffffff,#ffff00,#ffffff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shineText 4s linear infinite;
}
@keyframes shineText{
0%{background-position:200% center;}
100%{background-position:-200% center;}
}

.prize-line{
margin-top:15px;
font-size:22px;
font-weight:800;
color:#ffff00;
text-shadow:0 0 20px #ff8c00;
}

form{
display:flex;
flex-direction:column;
gap:18px;
margin-top:25px;
}

.row,.phone-group{
display:flex;
gap:18px;
}

input,select{
flex:1;
padding:18px;
border-radius:14px;
border:none;
font-size:15px;
font-weight:600;
background:rgba(255,255,255,0.95);
transition:all 0.3s ease;
}

input:focus,select:focus{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,255,255,0.5);
outline:none;
}

button{
padding:22px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#ff00cc,#ff8c00);
color:white;
font-size:22px;
font-weight:800;
cursor:pointer;
position:relative;
overflow:hidden;
}

/* Button shimmer */
button::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,0.5),transparent 60%);
animation:shimmer 5s infinite;
}
@keyframes shimmer{
0%{left:-100%;}
50%{left:120%;}
100%{left:120%;}
}

.dob-wrapper{
position:relative;
text-align:left;
}
.dob-label{
position:absolute;
top:8px;
left:18px;
font-size:14px;
font-weight:600;
color:#666;
pointer-events:none;
}

@media(max-width:768px){
.row,.phone-group{flex-direction:column;}
.nuclear-headline{font-size:26px;}
.prize-line{font-size:18px;}
}

</style>
</head>

<body>

<script>
/* Confetti */
setInterval(()=>{
for(let i=0;i<8;i++){
let c=document.createElement("div");
c.classList.add("confetti");
c.style.left=Math.random()*100+"vw";
c.style.width=(Math.random()*8+6)+"px";
c.style.height=(Math.random()*6+4)+"px";
c.style.background=["#ff00cc","#ff8c00","#00f5ff","#ffffff","#ffff00"][Math.floor(Math.random()*5)];
c.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),6000);
}
},600);

/* Floating particles */
setInterval(()=>{
let p=document.createElement("div");
p.classList.add("particle");
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*6+4)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),10000);
},800);
</script>

<div class="launch-banner">
🚀 Launching 1st June 2026 🚀
</div>

<div class="wrapper">
<div class="card">

<div class="nuclear-headline">
HURRY REGISTER NOW!!
</div>

<div class="prize-line">
UP TO $500 IN PRIZES!!
</div>

<form id="entryForm">

<div class="row">
<input type="text" name="first_name" placeholder="First Name" required>
<input type="text" name="surname" placeholder="Surname" required>
</div>

<select name="sex" required>
<option value="" disabled selected>Select Sex</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
<option>Prefer not to say</option>
</select>

<input type="email" name="email" placeholder="Email Address" required>

<div class="phone-group">
<select name="country_code" required>
<option value="+61">+61</option>
<option value="+1">+1</option>
<option value="+44">+44</option>
<option value="+64">+64</option>
</select>
<input type="tel" name="phone" placeholder="Phone Number" required>
</div>

<div class="dob-wrapper">
<label for="dob" class="dob-label">Select Your Birthday</label>
<input type="text" id="dob" name="date_of_birth" required>
</div>

<button type="submit">ENTER NOW 🚀</button>

</form>

</div>
</div>

<script>
flatpickr("#dob",{dateFormat:"Y-m-d",maxDate:"today",allowInput:true});
</script>

</body>
</html>
